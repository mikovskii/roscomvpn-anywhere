name: Update Anywhere Routing Configs

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"
  repository_dispatch:
    types: [update-anywhere-configs]
  push:
    branches: [main]
    paths:
      - "scripts/generate_anywhere.py"
      - "scripts/validate_anywhere.py"
      - "sources.json"

concurrency:
  group: update-anywhere-configs
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Find latest source tags
        id: versions
        shell: bash
        run: |
          set -euo pipefail

          latest_tag() {
            git ls-remote --tags "https://github.com/${1}.git" \
              | awk '{print $2}' \
              | sed -E 's@refs/tags/@@; s@\^\{\}@@' \
              | grep -E '^[0-9]{12}$' \
              | sort \
              | tail -n 1
          }

          geoip_repo="$(jq -r '.geoip.repository' sources.json)"
          geosite_repo="$(jq -r '.geosite.repository' sources.json)"
          current_geoip="$(jq -r '.geoip.tag' sources.json)"
          current_geosite="$(jq -r '.geosite.tag' sources.json)"
          geoip_tag="$(latest_tag "$geoip_repo")"
          geosite_tag="$(latest_tag "$geosite_repo")"

          test -n "$geoip_tag"
          test -n "$geosite_tag"

          changed=false
          if [[ "$geoip_tag" != "$current_geoip" ||
                "$geosite_tag" != "$current_geosite" ||
                "${{ github.event_name }}" == "push" ||
                "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            changed=true
          fi

          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          echo "geoip_repo=$geoip_repo" >> "$GITHUB_OUTPUT"
          echo "geosite_repo=$geosite_repo" >> "$GITHUB_OUTPUT"
          echo "geoip_tag=$geoip_tag" >> "$GITHUB_OUTPUT"
          echo "geosite_tag=$geosite_tag" >> "$GITHUB_OUTPUT"

      - name: Stop when sources are unchanged
        if: steps.versions.outputs.changed != 'true'
        run: echo "Routing sources are already up to date."

      - name: Update source versions
        if: steps.versions.outputs.changed == 'true'
        shell: bash
        env:
          GEOIP_TAG: ${{ steps.versions.outputs.geoip_tag }}
          GEOSITE_TAG: ${{ steps.versions.outputs.geosite_tag }}
        run: |
          set -euo pipefail
          tmp="$(mktemp)"
          jq \
            --arg geoip "$GEOIP_TAG" \
            --arg geosite "$GEOSITE_TAG" \
            '.geoip.tag = $geoip | .geosite.tag = $geosite' \
            sources.json > "$tmp"
          mv "$tmp" sources.json

      - name: Check out routing sources
        if: steps.versions.outputs.changed == 'true'
        shell: bash
        env:
          GEOIP_REPO: ${{ steps.versions.outputs.geoip_repo }}
          GEOIP_TAG: ${{ steps.versions.outputs.geoip_tag }}
          GEOSITE_REPO: ${{ steps.versions.outputs.geosite_repo }}
          GEOSITE_TAG: ${{ steps.versions.outputs.geosite_tag }}
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "$GEOIP_TAG" \
            "https://github.com/${GEOIP_REPO}.git" "$RUNNER_TEMP/roscomvpn-geoip"
          git clone --depth 1 --branch "$GEOSITE_TAG" \
            "https://github.com/${GEOSITE_REPO}.git" "$RUNNER_TEMP/roscomvpn-geosite"

      - name: Generate and validate configs
        if: steps.versions.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/generate_anywhere.py \
            --geoip "$RUNNER_TEMP/roscomvpn-geoip" \
            --geosite "$RUNNER_TEMP/roscomvpn-geosite"
          python3 scripts/validate_anywhere.py
          python3 -m unittest discover -s tests -v

      - name: Commit and push changes
        if: steps.versions.outputs.changed == 'true'
        id: commit
        shell: bash
        env:
          GEOIP_TAG: ${{ steps.versions.outputs.geoip_tag }}
          GEOSITE_TAG: ${{ steps.versions.outputs.geosite_tag }}
        run: |
          set -euo pipefail
          git config --local user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ANYWHERE sources.json stats.json

          if git diff --cached --quiet; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "Generated files are unchanged."
            exit 0
          fi

          git commit -m "Update routing: GeoIP ${GEOIP_TAG}, GeoSite ${GEOSITE_TAG}"
          git push
          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build release archives
        if: steps.commit.outputs.created == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          zip -qr release/RoscomVPN-Anywhere-DEFAULT.zip \
            ANYWHERE/DEFAULT README.md sources.json stats.json LICENSE THIRD_PARTY_NOTICES.md
          zip -qr release/RoscomVPN-Anywhere-WHITELIST.zip \
            ANYWHERE/WHITELIST README.md sources.json stats.json LICENSE THIRD_PARTY_NOTICES.md
          (
            cd release
            sha256sum *.zip > SHA256SUMS
          )

      - name: Publish GitHub Release
        if: steps.commit.outputs.created == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GEOIP_TAG: ${{ steps.versions.outputs.geoip_tag }}
          GEOSITE_TAG: ${{ steps.versions.outputs.geosite_tag }}
          COMMIT_SHA: ${{ steps.commit.outputs.sha }}
        run: |
          set -euo pipefail
          release_tag="routing-${GEOIP_TAG}-${GEOSITE_TAG}-${COMMIT_SHA}"
          notes="$(printf '%s\n' \
            "GeoIP: ${GEOIP_TAG}" \
            "GeoSite: ${GEOSITE_TAG}" \
            "" \
            "Архивы содержат профили DEFAULT и WHITELIST." \
            "Проверяйте целостность файлов по SHA256SUMS.")"
          gh release create "$release_tag" release/* \
            --target main \
            --title "Routing ${GEOIP_TAG} / ${GEOSITE_TAG}" \
            --notes "$notes"
